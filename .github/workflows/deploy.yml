name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions: {}

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Sync data
        run: make sync

      - name: Build
        run: |
          mkdir -p dist
          npx --yes terser@5.48.0 app.js --compress --mangle --output dist/app.js
          npx --yes clean-css-cli@5.6.3 styles.css -o dist/styles.css
          npx --yes html-minifier-terser@7.2.0 --collapse-whitespace --remove-comments --remove-redundant-attributes --remove-script-type-attributes --remove-style-link-type-attributes --minify-css --minify-js index.html -o dist/index.html
          node -e "require('fs').writeFileSync('dist/data.json', JSON.stringify(JSON.parse(require('fs').readFileSync('data.json','utf8'))))"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4