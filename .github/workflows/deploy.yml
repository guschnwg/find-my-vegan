name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install minifiers
        run: npm install --save-dev terser clean-css-cli html-minifier-terser

      - name: Sync data
        run: make sync

      - name: Build
        run: |
          mkdir -p dist
          npx terser app.js --compress --mangle --output dist/app.js
          npx cleancss styles.css -o dist/styles.css
          npx html-minifier-terser --collapse-whitespace --remove-comments --remove-redundant-attributes --remove-script-type-attributes --remove-style-link-type-attributes --minify-css --minify-js index.html -o dist/index.html
          node -e "require('fs').writeFileSync('dist/data.json', JSON.stringify(JSON.parse(require('fs').readFileSync('data.json','utf8'))))"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4